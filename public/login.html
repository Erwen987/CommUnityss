<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CommUnity – Login</title>

<link rel="stylesheet" href="src/login.css">
<link rel="icon" type="image/png" href="images/CommUnity Logo.png">

</head>


<body>

<!-- NAVBAR INCLUDE -->
<div id="navbar-placeholder"></div>


<!-- ================= MAIN ================= -->
<main class="hero">

<!-- Background Illustration -->
<div class="hero-bg"></div>


<div class="login-wrapper">

<div class="login-container">


<!-- LEFT SIDE: OVERVIEW -->
<div class="login-overview">

<h2>Welcome to CommUnity</h2>

<p>
CommUnity helps residents connect, report issues,
request services, and build a stronger barangay together.
</p>

<ul class="overview-points">

<li>✔ Report community concerns</li>
<li>✔ Request barangay services</li>
<li>✔ Earn rewards for participation</li>

</ul>

</div>


<!-- RIGHT SIDE: LOGIN FORM -->
<div class="login-form">

<h2>WELCOME BACK!</h2>

<form>

<label>Email / Phone Number</label>

<input
type="text"
placeholder="Enter your email or phone number"
required
>


<label>Password</label>

<input
type="password"
placeholder="Enter password"
required
>


<a href="#" class="forgot-link">
Forgot Password?
</a>


<button type="submit">
LOGIN
</button>


<p class="signup-text">

Don’t have an account?
<a href="signup.html">Sign up</a>

</p>

</form>

</div>


</div>
</div>

</main>


<!-- LOAD NAVBAR -->
<script>

fetch("includes/nav-bar.html")
.then(function(response){
return response.text();
})
.then(function(data){
document.getElementById("navbar-placeholder").innerHTML = data;
});

</script>


</body>
</html>
