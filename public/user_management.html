<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>User Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/user_management.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<main class="content">

<!-- LOADER -->
<div id="content-loader">
<div class="loader-spinner"></div>
</div>

<div id="page-content">

<!-- HEADER -->
<div id="header-container"></div>

<!-- STATS -->
<section class="stats">

<div class="card">
<span>All Users</span>
<strong id="allCount">0</strong>
</div>

<div class="card">
<span>Active Users</span>
<strong id="activeCount">0</strong>
</div>

<div class="card">
<span>Pending Registrations</span>
<strong id="pendingCount">0</strong>
</div>

<div class="card">
<span>Blocked Users</span>
<strong id="blockedCount">0</strong>
</div>

</section>


<!-- TABLE SECTION -->
<section class="table-card">

<input class="table-search" id="tableSearch" placeholder="Search users..." />


<!-- NEW SIGN UPS -->
<h3 style="margin-top:20px;">New Registrations</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="newUsersTable"></tbody>

</table>


<!-- OLD USERS -->
<h3 style="margin-top:30px;">Existing Users</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="existingUsersTable"></tbody>

</table>

</section>

</div>

</main>
</div>


<script>

/* ================= SIDEBAR ================= */

async function loadSidebar(){

const res = await fetch("includes/sidebar.html")
const html = await res.text()

document.getElementById("sidebar-container").innerHTML = html

const links = document.querySelectorAll(".menu a")
const current = window.location.pathname.split("/").pop()

links.forEach(link=>{
if(link.getAttribute("href") === current){
link.classList.add("active")
}
})

}


/* ================= HEADER ================= */

async function loadHeader(){

const res = await fetch("includes/header.html")
const html = await res.text()

document.getElementById("header-container").innerHTML = html

document.getElementById("page-title").textContent = "User Management"
document.getElementById("page-description").textContent =
"Approve and manage barangay residents"

}


/* ================= OTP GENERATOR ================= */

function generateOTP(){
return Math.floor(100000 + Math.random() * 900000)
}


/* ================= MOCK USERS ================= */

let mockUsers = [

{ id:1, name:"Juan Dela Cruz", email:"juan@email.com", status:"Active" },

{ id:2, name:"Maria Santos", email:"maria@email.com", status:"Pending" },

{ id:3, name:"Pedro Reyes", email:"pedro@email.com", status:"Blocked" },

{ id:4, name:"Ana Lopez", email:"ana@email.com", status:"Active" },

{ id:5, name:"Carlos Rivera", email:"carlos@email.com", status:"Pending" },

{ id:6, name:"Angela Bautista", email:"angela@email.com", status:"Pending" },

{ id:7, name:"Michael Cruz", email:"michael@email.com", status:"OTP Sent" },

{ id:8, name:"Samantha Torres", email:"samantha@email.com", status:"Pending" },

{ id:9, name:"Joseph Ramirez", email:"joseph@email.com", status:"Inactive" },

{ id:10, name:"Daniela Flores", email:"daniela@email.com", status:"Active" }

]


/* ================= LOAD STATS ================= */

function loadStats(){

const all = mockUsers.length
const active = mockUsers.filter(u=>u.status==="Active").length
const pending = mockUsers.filter(u=>u.status==="Pending").length
const blocked = mockUsers.filter(u=>u.status==="Blocked").length

document.getElementById("allCount").textContent = all
document.getElementById("activeCount").textContent = active
document.getElementById("pendingCount").textContent = pending
document.getElementById("blockedCount").textContent = blocked

}


/* ================= RENDER USERS ================= */

function renderUsers(users){

const newTable = document.getElementById("newUsersTable")
const oldTable = document.getElementById("existingUsersTable")

newTable.innerHTML=""
oldTable.innerHTML=""

users.forEach(user=>{

const row = `

<tr data-id="${user.id}">

<td>
<div class="user">

<div class="avatar"></div>

<div>
<strong>${user.name}</strong><br>
<small>${user.email}</small>
</div>

</div>
</td>

<td class="status ${user.status.toLowerCase()}">
${user.status}
</td>

<td class="actions">

<button class="action-btn">⋯</button>

<div class="dropdown-menu">

<span data-action="view">View</span>
<span data-action="edit">Edit</span>

${
user.status==="Pending"
? `<span data-action="approve">Approve & Send OTP</span>`
: ""
}

${
user.status==="OTP Sent"
? `<span data-action="resend">Resend OTP</span>`
: ""
}

${
user.status==="Blocked"
? `<span data-action="unblock">Unblock</span>`
: `<span data-action="block">Block</span>`
}

<span class="danger" data-action="delete">Delete</span>

</div>

</td>

</tr>
`

if(user.status==="Pending" || user.status==="OTP Sent"){
newTable.innerHTML += row
}
else{
oldTable.innerHTML += row
}

})

}


/* ================= SEARCH ================= */

document.getElementById("tableSearch").addEventListener("input",function(){

const value=this.value.toLowerCase()

const filtered = mockUsers.filter(user=>
user.name.toLowerCase().includes(value) ||
user.email.toLowerCase().includes(value)
)

renderUsers(filtered)

})


/* ================= ACTIONS ================= */

document.addEventListener("click",function(e){

if(e.target.classList.contains("action-btn")){

e.stopPropagation()

const menu=e.target.nextElementSibling

document.querySelectorAll(".dropdown-menu").forEach(m=>{
if(m!==menu) m.style.display="none"
})

menu.style.display = menu.style.display==="block" ? "none" : "block"

return
}

if(e.target.dataset.action){

const row = e.target.closest("tr")
const id = parseInt(row.dataset.id)

const user = mockUsers.find(u=>u.id===id)

/* APPROVE USER */

if(e.target.dataset.action==="approve"){

const otp = generateOTP()

user.status="OTP Sent"
user.otp=otp

alert("OTP sent to "+user.email+"\nCode: "+otp)

}

/* RESEND OTP */

if(e.target.dataset.action==="resend"){

const otp = generateOTP()
user.otp=otp

alert("New OTP sent to "+user.email+"\nCode: "+otp)

}

/* BLOCK */

if(e.target.dataset.action==="block"){
user.status="Blocked"
}

/* UNBLOCK */

if(e.target.dataset.action==="unblock"){
user.status="Active"
}

/* DELETE */

if(e.target.dataset.action==="delete"){
mockUsers = mockUsers.filter(u=>u.id!==id)
}

renderUsers(mockUsers)
loadStats()

}

document.querySelectorAll(".dropdown-menu").forEach(menu=>{
menu.style.display="none"
})

})


/* ================= LOADER ================= */

window.addEventListener("load",()=>{

const loader=document.getElementById("content-loader")
const content=document.getElementById("page-content")

setTimeout(()=>{

loader.style.display="none"
content.style.opacity="1"

},1500)

})


/* ================= INIT ================= */

loadSidebar()
loadHeader()
loadStats()
renderUsers(mockUsers)

</script>

</body>
</html>
