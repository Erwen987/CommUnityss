<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CommUnity | Requests</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/request_admin.css">

</head>

<body>

<!-- PAGE LOADER -->
<div id="page-loader">
<div class="loader-spinner"></div>
</div>

<div class="app">

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<main class="main">

<!-- HEADER -->
<div id="header-container"></div>

<!-- ================= STATS ================= -->
<section class="stats">

<div class="card stat">
<span>Total Requests</span>
<strong id="totalRequests">0</strong>
</div>

<div class="card stat">
<span>Reviewing</span>
<strong id="reviewingCount">0</strong>
</div>

<div class="card stat">
<span>Processing</span>
<strong id="processingCount">0</strong>
</div>

<div class="card stat">
<span>Ready for Pickup</span>
<strong id="readyCount">0</strong>
</div>

<div class="card stat">
<span>Released</span>
<strong id="releasedCount">0</strong>
</div>

</section>


<!-- ================= TABLE ================= -->
<section class="card">

<h3 style="margin-bottom:20px;">Requests List</h3>

<div style="display:flex;gap:10px;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;">

<input
type="text"
id="filterSearch"
placeholder="Search requests..."
style="padding:8px 12px;border-radius:8px;border:1px solid #ccc;min-width:220px;"
>

<select
id="statusFilter"
style="padding:8px 12px;border-radius:8px;border:1px solid #ccc;"
>

<option value="">All Status</option>
<option value="reviewing">Reviewing</option>
<option value="processing">Processing</option>
<option value="ready">Ready for Pickup</option>
<option value="released">Released</option>

</select>

</div>

<table>

<thead>
<tr>
<th>Request ID</th>
<th>Document</th>
<th>Resident</th>
<th>Status</th>
<th>Date Submitted</th>
<th>Action</th>
</tr>
</thead>

<tbody id="requestsTable"></tbody>

</table>

<div id="emptyState" class="empty-state" style="display:none;">
No requests found.
</div>

</section>

</main>
</div>


<!-- ================= VIEW DETAILS MODAL ================= -->

<div class="modal-overlay" id="detailsModal">

<div class="modal-card">

<div class="modal-header">
<h3>Request Details</h3>
<span class="modal-close" onclick="closeDetails()">×</span>
</div>

<div class="modal-body" id="modalContent"></div>

</div>

</div>



<script>

/* =========================
   LOAD SIDEBAR
========================= */

async function loadSidebar(){

const res = await fetch("includes/sidebar.html")
const html = await res.text()

document.getElementById("sidebar-container").innerHTML = html

const links = document.querySelectorAll(".menu a")
const current = window.location.pathname.split("/").pop()

links.forEach(link=>{
if(link.getAttribute("href") === current){
link.classList.add("active")
}
})

}


/* =========================
   LOAD HEADER
========================= */

async function loadHeader(){

const res = await fetch("includes/header.html")
const html = await res.text()

document.getElementById("header-container").innerHTML = html

document.getElementById("page-title").textContent = "Requests"
document.getElementById("page-description").textContent =
"Monitor and manage barangay document requests."

}


/* =========================
   PAGE LOADER
========================= */

window.addEventListener("load",()=>{

setTimeout(()=>{
document.getElementById("page-loader").style.display="none"
},1200)

})


/* =========================
   MOCK DATA
========================= */

let requests = [

{
requestId:"REQ-001-2026",
document:"Barangay Clearance",
resident:"Juan Dela Cruz",
status:"reviewing",
dateSubmitted:"2026-01-05",
purpose:"Job Application",
contact:"09123456789"
},

{
requestId:"REQ-002-2026",
document:"Certificate of Residency",
resident:"Maria Santos",
status:"processing",
dateSubmitted:"2026-01-08",
purpose:"School Requirement",
contact:"09181234567"
},

{
requestId:"REQ-003-2026",
document:"Indigency Certificate",
resident:"Pedro Reyes",
status:"ready",
dateSubmitted:"2026-01-10",
purpose:"Medical Assistance",
contact:"09221234567"
},

{
requestId:"REQ-004-2026",
document:"Business Clearance",
resident:"Ana Lopez",
status:"released",
dateSubmitted:"2026-01-11",
purpose:"Business Permit",
contact:"09351234567"
}

]


/* =========================
   LOAD DATA
========================= */

function loadRequests(){

renderStats(requests)
renderTable(requests)

}


/* =========================
   STATS
========================= */

function renderStats(data){

document.getElementById("totalRequests").textContent = data.length

document.getElementById("reviewingCount").textContent =
data.filter(r=>r.status==="reviewing").length

document.getElementById("processingCount").textContent =
data.filter(r=>r.status==="processing").length

document.getElementById("readyCount").textContent =
data.filter(r=>r.status==="ready").length

document.getElementById("releasedCount").textContent =
data.filter(r=>r.status==="released").length

}


/* =========================
   TABLE
========================= */

function renderTable(data){

const tbody = document.getElementById("requestsTable")
const emptyState = document.getElementById("emptyState")

tbody.innerHTML=""

if(data.length===0){
emptyState.style.display="block"
return
}

emptyState.style.display="none"

data.forEach((r,index)=>{

const row=document.createElement("tr")

row.innerHTML=`

<td>${r.requestId}</td>
<td>${r.document}</td>
<td>${r.resident}</td>
<td><span class="badge ${r.status}">${r.status}</span></td>
<td>${new Date(r.dateSubmitted).toLocaleDateString()}</td>

<td>
<button class="view-btn" onclick="openDetails(${index})">
View Details
</button>
</td>

`

tbody.appendChild(row)

})

}


/* =========================
   VIEW DETAILS MODAL
========================= */

function openDetails(index){

const r=requests[index]

document.getElementById("modalContent").innerHTML=`

<p><strong>Request ID:</strong> ${r.requestId}</p>
<p><strong>Resident:</strong> ${r.resident}</p>
<p><strong>Document:</strong> ${r.document}</p>
<p><strong>Status:</strong> ${r.status}</p>
<p><strong>Date Submitted:</strong> ${new Date(r.dateSubmitted).toLocaleDateString()}</p>
<p><strong>Purpose:</strong> ${r.purpose}</p>
<p><strong>Contact:</strong> ${r.contact}</p>

`

document.getElementById("detailsModal").style.display="flex"

}

function closeDetails(){
document.getElementById("detailsModal").style.display="none"
}


/* CLOSE WHEN CLICKING OUTSIDE */

window.addEventListener("click",(e)=>{

const modal=document.getElementById("detailsModal")

if(e.target===modal){
modal.style.display="none"
}

})


/* =========================
   FILTER
========================= */

document.getElementById("statusFilter").addEventListener("change",filterTable)
document.getElementById("filterSearch").addEventListener("input",filterTable)

function filterTable(){

const search=document.getElementById("filterSearch").value.toLowerCase()
const status=document.getElementById("statusFilter").value

const filtered=requests.filter(r=>{

const matchSearch =
r.resident.toLowerCase().includes(search) ||
r.document.toLowerCase().includes(search)

const matchStatus =
status === "" || r.status === status

return matchSearch && matchStatus

})

renderTable(filtered)

}


/* =========================
   INIT
========================= */

loadSidebar()
loadHeader()
loadRequests()

</script>

</body>
</html>
